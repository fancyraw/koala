spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 4
      maximum-pool-size: 20
      connection-timeout: 30000
      max-lifetime: 1800000
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 16
        min-idle: 2

koala:
  jwt:
    # prod 必须显式提供密钥，缺失即启动失败，避免使用 dev 默认值
    secret: ${KOALA_JWT_SECRET}
  wechat:
    # prod 强制关闭 mock，任何调用面（登录 / 支付回调 / 退款）在配置缺失时直接拒绝
    mock-when-unconfigured: false
  cors:
    # prod 显式白名单；多个用英文逗号分隔
    allowed-origins: ${KOALA_CORS_ALLOWED_ORIGINS:https://example.com}

# prod 仅暴露 health / info；metrics 不对外
management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: warn
    com.koala: info
  file:
    name: logs/koala-server.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 7
