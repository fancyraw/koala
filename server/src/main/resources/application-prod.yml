spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 4
      maximum-pool-size: 20
      connection-timeout: 30000
      max-lifetime: 1800000
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 16
        min-idle: 2

logging:
  level:
    root: warn
    com.koala: info
  file:
    name: logs/koala-server.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 7
