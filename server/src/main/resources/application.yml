server:
  port: 8080
  servlet:
    context-path: /api/v1
  tomcat:
    threads:
      max: 200

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: koala-server
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.koala.entity

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  health:
    redis:
      enabled: true

# 业务自定义配置
koala:
  jwt:
    secret: ${KOALA_JWT_SECRET:koala-dev-secret-please-override-in-prod-env-min-256bit-length}
    user-ttl-minutes: 4320      # C 端 token 有效期 (3 天)
    admin-ttl-minutes: 720      # 后台 token 有效期 (12 小时)
  admin:
    super-openid: ${KOALA_SUPER_OPENID:}
  storage:
    provider: qiniu
  alert:
    wework-webhook: ${KOALA_ALERT_WEWORK_WEBHOOK:}

logging:
  level:
    com.koala: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
