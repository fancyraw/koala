# 生产部署：app + mysql + redis 全容器。
# 用法（在项目根目录）：
#   cp deploy/.env.example deploy/.env   # 按需填写密钥/密码
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --build
services:
  app:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: koala-server:latest
    container_name: koala-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-koala}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set in .env}
      KOALA_JWT_SECRET: ${KOALA_JWT_SECRET:?set in .env}
      KOALA_SUPER_OPENID: ${KOALA_SUPER_OPENID:-}
      KOALA_ALERT_WEWORK_WEBHOOK: ${KOALA_ALERT_WEWORK_WEBHOOK:-}
    ports:
      - "8080:8080"
    volumes:
      - koala-app-logs:/app/logs

  mysql:
    image: mysql:8.0
    container_name: koala-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-koala}
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_general_ci"]
    volumes:
      - koala-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: koala-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set in .env}"]
    volumes:
      - koala-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  koala-mysql:
  koala-redis:
  koala-app-logs:
