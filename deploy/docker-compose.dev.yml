# 本地开发依赖：仅起 MySQL + Redis，后端用 mvn spring-boot:run 在宿主机跑（便于看日志/热迭代）。
# 用法：docker compose -f deploy/docker-compose.dev.yml up -d
services:
  mysql:
    image: mysql:8.0
    container_name: koala-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: koala
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_general_ci"]
    ports:
      - "3306:3306"
    volumes:
      - koala-mysql-dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: koala-redis-dev
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - koala-redis-dev:/data

volumes:
  koala-mysql-dev:
  koala-redis-dev:
