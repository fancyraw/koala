<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOALA 管理后台 · UI 原型</title>
<style>
  :root{
    --blue:#1677FF; --blue-bg:#E6F0FF; --dark:#1A2332;
    --green:#52C41A; --yellow:#FAAD14; --red:#FF4D4F;
    --t1:#262626; --t2:#595959; --t3:#8C8C8C; --t4:#BFBFBF;
    --bg:#F0F2F5; --line:#F0F0F0; --thead:#FAFAFA;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t2);font-size:14px;}

  /* 顶栏 */
  .topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--dark);display:flex;align-items:center;padding:0 20px;z-index:100;color:#fff;}
  .topbar .fold{font-size:18px;cursor:pointer;margin-right:14px;opacity:.85;}
  .topbar .logo{width:30px;height:30px;border-radius:7px;background:var(--blue);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;margin-right:10px;}
  .topbar .ttl{font-size:16px;font-weight:600;}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:20px;}
  .topbar .bell{position:relative;cursor:pointer;font-size:16px;}
  .topbar .bell i{position:absolute;top:-3px;right:-4px;width:7px;height:7px;background:var(--red);border-radius:50%;}
  .topbar .adm{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;}
  .topbar .adm .av{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;}

  /* 侧栏 */
  .sidebar{position:fixed;top:56px;left:0;bottom:0;width:220px;background:#fff;border-right:1px solid var(--line);overflow-y:auto;z-index:90;}
  .sidebar::-webkit-scrollbar{width:6px;} .sidebar::-webkit-scrollbar-thumb{background:#E0E0E0;border-radius:3px;}
  .menu-group{font-size:12px;color:var(--t4);padding:14px 20px 6px;}
  .menu-item{display:flex;align-items:center;gap:10px;height:44px;padding:0 20px;cursor:pointer;color:var(--t2);font-size:14px;position:relative;}
  .menu-item .ic{width:18px;text-align:center;}
  .menu-item.sub{padding-left:34px;font-size:13px;}
  .menu-item:hover{background:#FAFAFA;}
  .menu-item.on{background:var(--blue-bg);color:var(--blue);font-weight:600;}
  .menu-item.on::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue);}
  .menu-divider{height:1px;background:var(--line);margin:8px 16px;}
  .ver{font-size:12px;color:var(--t4);padding:14px 20px;}

  /* 主区 */
  .main{margin-left:220px;margin-top:56px;padding:20px 24px 40px;min-height:calc(100vh - 56px);}
  .crumb{font-size:13px;color:var(--t3);margin-bottom:16px;}
  .crumb b{color:var(--t2);font-weight:400;}
  .page-title{font-size:20px;font-weight:600;color:var(--t1);}

  .card{background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.06);padding:20px;margin-bottom:16px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .card-head h3{font-size:16px;font-weight:600;color:var(--t1);}

  /* 按钮 */
  .btn{height:32px;padding:0 15px;border-radius:6px;font-size:14px;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:4px;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#3b8aff;}
  .btn-default{background:#fff;border-color:#D9D9D9;color:var(--t2);}
  .btn-default:hover{border-color:var(--blue);color:var(--blue);}
  .btn-danger{background:#fff;border-color:#FFCCC7;color:var(--red);}
  .link{color:var(--blue);cursor:pointer;}
  .link:hover{opacity:.8;}
  .link.danger{color:var(--red);}
  .link.muted{color:var(--t3);}

  /* 工具栏 */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .input,.select{height:32px;border:1px solid #D9D9D9;border-radius:6px;padding:0 11px;font-size:14px;color:var(--t2);background:#fff;}
  .input{width:200px;}
  .input::placeholder{color:var(--t4);}
  .select{cursor:pointer;}
  .toolbar .right{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .count{color:var(--t3);font-size:13px;}

  /* 表格 */
  table{width:100%;border-collapse:collapse;}
  thead th{background:var(--thead);text-align:left;font-weight:500;font-size:14px;color:var(--t2);padding:12px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
  tbody td{padding:12px 12px;border-bottom:1px solid var(--line);font-size:14px;color:var(--t2);}
  tbody tr:hover{background:#FAFAFA;}
  .pimg{width:44px;height:44px;border-radius:6px;background:linear-gradient(135deg,#E6F0FF,#D4E4FF);display:flex;align-items:center;justify-content:center;font-size:20px;}
  .price{color:var(--red);font-weight:600;}

  /* 标签 */
  .tag{display:inline-block;padding:0 8px;border-radius:4px;font-size:12px;line-height:20px;}
  .tag.green{color:var(--green);background:#F6FFED;border:1px solid #B7EB8F;}
  .tag.red{color:var(--red);background:#FFF1F0;border:1px solid #FFCCC7;}
  .tag.gray{color:var(--t3);background:#FAFAFA;border:1px solid #D9D9D9;}
  .tag.yellow{color:var(--yellow);background:#FFFBE6;border:1px solid #FFE58F;}
  .tag.blue{color:var(--blue);background:var(--blue-bg);border:1px solid #91CAFF;}
  .tag.gold{color:#A8791A;background:#FBF3DF;border:1px solid #E8C97A;}

  /* 分页 */
  .pager{display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-top:16px;}
  .pager .pg{min-width:32px;height:32px;border:1px solid #D9D9D9;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;background:#fff;}
  .pager .pg.on{background:var(--blue);color:#fff;border-color:var(--blue);}

  /* 指标卡 */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px;}
  .stat{background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.06);padding:20px;}
  .stat .lab{font-size:14px;color:var(--t3);}
  .stat .num{font-size:32px;font-weight:700;color:var(--t1);margin:8px 0;line-height:1;}
  .stat .chg{font-size:12px;}
  .stat .chg.up{color:var(--green);} .stat .chg.down{color:var(--red);}

  /* Tabs */
  .tabs{display:flex;gap:24px;border-bottom:1px solid var(--line);margin-bottom:18px;}
  .tabs .tab{padding:10px 2px;font-size:14px;color:var(--t2);cursor:pointer;position:relative;}
  .tabs .tab.on{color:var(--blue);font-weight:600;}
  .tabs .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--blue);}
  .tabs .tab .badge{color:var(--t3);font-size:12px;}

  /* 柱状图占位 */
  .chart{display:flex;align-items:flex-end;gap:16px;height:200px;padding:10px 0;}
  .chart .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;}
  .chart .bar .b{width:60%;background:linear-gradient(180deg,#1677FF,#69A9FF);border-radius:4px 4px 0 0;}
  .chart .bar .x{font-size:12px;color:var(--t3);}

  /* 优惠券卡片 */
  .coupons{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .cpc{border:1px solid var(--line);border-radius:8px;padding:16px;position:relative;}
  .cpc .cn{font-size:16px;font-weight:600;color:var(--t1);}
  .cpc .row{font-size:13px;color:var(--t3);margin-top:8px;}
  .cpc .data{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);font-size:13px;color:var(--t2);}
  .cpc .acts{margin-top:14px;display:flex;gap:14px;}
  .cpc .st{position:absolute;right:16px;top:16px;font-size:12px;}

  /* 表单 */
  .form-row{display:flex;align-items:center;margin-bottom:18px;}
  .form-row .lab{width:110px;text-align:right;color:var(--t2);padding-right:16px;flex-shrink:0;}
  .form-row .ctl{flex:1;}
  .form-row .ctl .input{width:320px;}
  .uploader{width:88px;height:88px;border:1px dashed #D9D9D9;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);font-size:12px;gap:4px;cursor:pointer;background:#FAFAFA;}
  .textarea{width:420px;height:90px;border:1px solid #D9D9D9;border-radius:6px;padding:8px 11px;font-size:14px;font-family:inherit;resize:none;}
  .group-title{font-size:16px;font-weight:600;color:var(--t1);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--line);}
  .form-foot{text-align:right;padding-top:8px;border-top:1px solid var(--line);margin-top:8px;}
  .form-foot .btn{margin-left:10px;}
  .toggle{display:inline-flex;width:44px;height:24px;border-radius:999px;background:var(--green);position:relative;cursor:pointer;}
  .toggle i{position:absolute;top:2px;right:2px;width:20px;height:20px;background:#fff;border-radius:50%;}

  /* 运维状态卡 */
  .ops-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px;}
  .ops-stat{border:1px solid var(--line);border-radius:8px;padding:16px;}
  .ops-stat .t{font-size:13px;color:var(--t3);}
  .ops-stat .v{font-size:15px;font-weight:600;color:var(--t1);margin-top:8px;display:flex;align-items:center;gap:6px;}
  .ops-stat .v .dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
  .ops-stat .sub{font-size:12px;color:var(--t3);margin-top:4px;}
  .sqlbox{width:100%;height:80px;border:1px solid #D9D9D9;border-radius:6px;padding:10px;font-family:monospace;font-size:13px;resize:none;background:#FAFAFA;}
  .order-detail{background:#FAFAFA;font-size:13px;color:var(--t2);line-height:1.9;}
  .order-detail td{padding:12px 16px;}
</style>
</head>
<body>
  <div class="topbar">
    <span class="fold">≡</span>
    <span class="logo">K</span>
    <span class="ttl">KOALA 管理后台</span>
    <div class="right">
      <span class="bell">🔔<i></i></span>
      <span class="adm"><span class="av">管</span>管理员 ▾</span>
    </div>
  </div>

  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>

<script>
/* ---------- 菜单 ---------- */
const MENU=[
  {k:'dashboard',ic:'📊',l:'数据看板'},
  {k:'products',ic:'📦',l:'商品管理'},
  {k:'orders',ic:'📋',l:'订单管理'},
  {k:'users',ic:'👥',l:'用户管理'},
  {k:'coupons',ic:'🎟️',l:'优惠券管理'},
  {k:'marketing',ic:'🎯',l:'营销配置'},
  {k:'banners',ic:'🖼️',l:'内容管理'},
  {k:'settings',ic:'⚙️',l:'系统设置'},
  {divider:true},
  {k:'ops',ic:'🛠️',l:'运维管理'},
];
const CRUMB={
  dashboard:'数据看板', products:'商品管理', productEdit:'商品管理 / 商品编辑', categories:'商品管理 / 分类管理',
  orders:'订单管理', users:'用户管理', userDetail:'用户管理 / 用户详情', coupons:'优惠券管理',
  marketing:'营销配置', banners:'内容管理 / Banner 管理',
  settings:'系统设置', ops:'运维管理'
};
let current='dashboard';

function renderMenu(){
  const MENU_PARENT={productEdit:'products',categories:'products',userDetail:'users'};
  const active=MENU_PARENT[current]||current;
  document.getElementById('sidebar').innerHTML=MENU.map(m=>{
    if(m.group)return `<div class="menu-group">${m.group}</div>`;
    if(m.divider)return `<div class="menu-divider"></div>`;
    return `<div class="menu-item ${m.sub?'sub':''} ${m.k===active?'on':''}" onclick="nav('${m.k}')">
      ${m.sub?'':`<span class="ic">${m.ic}</span>`}<span>${m.l}</span></div>`;
  }).join('')+`<div class="ver">v1.0.0</div>`;
}
function nav(k){current=k;renderMenu();
  document.getElementById('main').innerHTML=`<div class="crumb">首页 / <b>${CRUMB[k]}</b></div>`+PAGES[k]();
}

/* ---------- 通用 ---------- */
function pager(total){return `<div class="pager"><span class="pg" onclick="pagePrev(this)">‹</span><span class="pg on">1</span><span class="pg" onclick="pageTo(this)">2</span><span class="pg" onclick="pageTo(this)">3</span><span class="pg" onclick="pageNext(this)">›</span><span class="count" style="margin-left:8px">共 ${total} 页</span></div>`;}
function pageTo(el){el.parentElement.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));el.classList.add('on');}
function pagePrev(el){const pgs=[...el.parentElement.querySelectorAll('.pg:not(:first-child):not(:last-child)')];const cur=pgs.findIndex(p=>p.classList.contains('on'));if(cur>0){pgs.forEach(p=>p.classList.remove('on'));pgs[cur-1].classList.add('on');}}
function pageNext(el){const pgs=[...el.parentElement.querySelectorAll('.pg:not(:first-child):not(:last-child)')];const cur=pgs.findIndex(p=>p.classList.contains('on'));if(cur<pgs.length-1){pgs.forEach(p=>p.classList.remove('on'));pgs[cur+1].classList.add('on');}}

/* Tab 切换 — 纯高亮切换 */
function switchTab(el){el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');}

/* 按钮组切换 */
function switchBtn(el){el.parentElement.querySelectorAll('.btn').forEach(b=>{b.classList.remove('btn-primary');b.classList.add('btn-default');});el.classList.remove('btn-default');el.classList.add('btn-primary');}

/* Toggle 开关 */
function switchToggle(el){
  const on=el.style.background!=='rgb(82, 196, 26)';
  el.style.background=on?'var(--green)':'#D9D9D9';
  const i=el.querySelector('i');
  if(on){i.style.right='2px';i.style.left='auto';}else{i.style.right='auto';i.style.left='2px';}
  const label=el.nextElementSibling;
  if(label&&label.tagName==='SPAN')label.textContent=on?'已启用':'已关闭';
}

/* Tab 切换 — 带内容区切换（用 data-tab 匹配 data-panel） */
function switchTabPanel(el){
  const tabs=el.parentElement;
  tabs.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const idx=[...tabs.children].filter(c=>c.classList.contains('tab')).indexOf(el);
  const card=tabs.closest('.card')||tabs.parentElement;
  card.querySelectorAll('.tab-panel').forEach((p,i)=>{p.style.display=i===idx?'':'none';});
}

/* ---------- 页面 ---------- */
const PAGES={};

PAGES.dashboard=()=>{
  const bars=[['周一',60],['周二',85],['周三',70],['周四',95],['周五',120],['周六',150],['周日',110]];
  const max=160;
  const todo=[['待付款',5,'orders'],['待发货',8,'orders'],['待收货',12,'orders'],['退款售后',2,'orders']];
  const hot=[['1','百花蜜 500g','120','¥10,560'],['2','蜂王浆 250g','88','¥14,784'],['3','蜂蜡手工皂','64','¥2,496'],['4','蜂蜜礼盒装','46','¥10,028'],['5','椴树蜜 500g','38','¥3,344']];
  return `
  <div class="card-head"><h2 class="page-title">数据看板</h2>
    <span class="btn btn-default">刷新</span></div>
  <div class="stats">
    <div class="stat"><div class="lab">今日销售额</div><div class="num">¥2,580</div><div class="chg up">↑ 15% 较昨日</div></div>
    <div class="stat"><div class="lab">今日订单</div><div class="num">12</div><div class="chg up">↑ 20% 较昨日</div></div>
    <div class="stat"><div class="lab">今日新增用户</div><div class="num">3</div><div class="chg down">↓ 10% 较昨日</div></div>
    <div class="stat" onclick="nav('orders')" style="cursor:pointer"><div class="lab">待处理退款</div><div class="num" style="color:var(--red)">2</div><div class="chg" style="color:var(--red)"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-right:4px;animation:blink 1s infinite"></span>去处理 ›</div></div>
  </div>
  <div class="card">
    <div class="group-title">待处理事项</div>
    <div style="display:flex;gap:32px;padding:4px 0">
      ${todo.map(t=>`<div onclick="nav('${t[2]}')" style="cursor:pointer">
        <span style="font-size:14px;color:var(--t2)">${t[0]}</span>
        <span style="font-size:22px;font-weight:700;color:var(--t1);margin-left:8px">${t[1]}</span></div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-head" style="margin-bottom:4px"><div class="group-title" style="margin:0">销售趋势</div>
      <div class="tabs" style="border:none"><span class="tab on" onclick="switchTab(this)">近 7 天</span><span class="tab" onclick="switchTab(this)">近 30 天</span></div></div>
    <div class="chart">${bars.map(b=>`<div class="bar"><div class="b" style="height:${b[1]/max*180}px"></div><div class="x">${b[0]}</div></div>`).join('')}</div>
  </div>
  <div class="card">
    <div class="card-head" style="margin-bottom:4px"><div class="group-title" style="margin:0">热销商品 Top 5</div>
      <span class="link" onclick="nav('products')">查看全部 ›</span></div>
    <table><thead><tr><th style="width:60px">排名</th><th>商品名称</th><th>销量</th><th>销售额</th></tr></thead>
    <tbody>${hot.map(h=>`<tr><td><b>${h[0]}</b></td><td>${h[1]}</td><td>${h[2]}</td><td><span class="price">${h[3]}</span></td></tr>`).join('')}</tbody></table>
  </div>`;
};

PAGES.products=()=>{
  const rows=[
    ['🍯','百花蜜 500g','¥88',['热销'],'✓','150','蜂蜜','green','上架'],
    ['🫙','蜂王浆 250g','¥168',['新品'],'','8','蜂蜜','green','上架'],
    ['🧼','蜂蜡手工皂','¥39',[],'','0','日用','red','已售罄'],
    ['🎁','蜂蜜礼盒装','¥218',['礼盒'],'✓','46','礼盒','green','上架'],
  ];
  return `
  <div class="card-head"><h2 class="page-title">商品列表</h2><div style="display:flex;gap:8px"><span class="btn btn-default" onclick="nav('categories')">分类管理</span><span class="btn btn-primary" onclick="nav('productEdit')">+ 新增商品</span></div></div>
  <div class="card">
    <div class="toolbar"><input class="input" placeholder="🔍 搜索商品名称">
      <select class="select"><option>全部分类</option><option>蜂蜜</option><option>日用</option></select>
      <select class="select"><option>全部状态</option><option>上架</option><option>下架</option></select>
      <div class="right"><span class="count">共 ${rows.length} 件商品</span></div></div>
    <table><thead><tr><th>主图</th><th>商品名称</th><th>售价</th><th>标签</th><th>推荐</th><th>库存</th><th>分类</th><th>状态</th><th>操作</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td><div class="pimg">${r[0]}</div></td>
      <td>${r[1]}</td>
      <td><span class="price">${r[2]}</span></td>
      <td>${r[3].map(t=>`<span class="tag blue">${t}</span>`).join(' ')||'—'}</td>
      <td>${r[4]?'<span style="color:var(--blue)">✓</span>':'—'}</td>
      <td>${r[5]==='0'?'<span class="tag red">售罄</span>':(+r[5]<20?`${r[5]} <span class="tag yellow">不足</span>`:r[5])}</td>
      <td>${r[6]}</td>
      <td><span class="tag ${r[7]}">${r[8]}</span></td>
      <td><span class="link" onclick="nav('productEdit')">编辑</span> <span class="link ${r[8]==='已售罄'?'':'danger'}">${r[8]==='已售罄'?'上架':'下架'}</span></td>
    </tr>`).join('')}</tbody></table>
    ${pager(3)}
  </div>`;
};

PAGES.categories=()=>{
  const rows=[['1','🍯','蜂蜜','12','green','启用'],['2','🧴','日用','5','green','启用'],['3','🎁','礼盒','3','green','启用'],['4','🌿','养生','0','gray','禁用']];
  return `
  <div class="link" onclick="nav('products')" style="margin-bottom:12px;display:inline-block">‹ 返回商品列表</div>
  <div class="card-head"><h2 class="page-title">分类管理</h2><span class="btn btn-primary">+ 新增分类</span></div>
  <div class="card">
    <div style="color:var(--t3);font-size:13px;margin-bottom:12px">💡 分类是商品的属性维度，从商品列表工具栏「分类管理」进入；仅商品数为 0 的分类可删除</div>

function switchSettingsTab(idx){
  const card=document.getElementById('st-panel-0')?.parentElement;
  if(!card)return;
  card.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('on'));
  card.querySelectorAll('.tabs .tab')[idx]?.classList.add('on');
  for(let i=0;i<3;i++){const p=document.getElementById('st-panel-'+i);if(p)p.style.display=i===idx?'':'none';}
}

        <div class="ops-stat"><div class="t">数据库</div><div class="v"><span class="dot"></span>正常</div><div class="sub">连接数 5</div></div>
        <div class="ops-stat"><div class="t">Redis</div><div class="v"><span class="dot"></span>正常</div><div class="sub">内存 28M</div></div>
        <div class="ops-stat"><div class="t">磁盘</div><div class="v">已用 35%</div><div class="sub">18G / 50G</div></div>
      </div>
      <div class="count">JVM：堆 256M/512M ｜ CPU 12% ｜ 内存 1.2G/2G　（自动刷新）</div>
    </div>
    <div id="ops-panel-1" style="display:none">
      <div class="group-title">运营监控（产品）</div>
      <div class="ops-stats">
        <div class="ops-stat"><div class="t">今日 PV</div><div class="v">8,420</div><div class="sub">↑12% 较昨日</div></div>
        <div class="ops-stat"><div class="t">今日 UV</div><div class="v">1,250</div><div class="sub">↑8% 较昨日</div></div>
        <div class="ops-stat"><div class="t">实时下单</div><div class="v">12</div><div class="sub">近 1 小时</div></div>
        <div class="ops-stat"><div class="t">支付成功率</div><div class="v">98%</div><div class="sub">今日</div></div>
      </div>
      <div class="group-title" style="margin-top:16px">转化漏斗</div>
      <div class="count">浏览 8,420 → 加购 1,860 → 下单 320 → 支付 296</div>
      <div class="chart" style="margin-top:12px;align-items:center;justify-content:center;color:var(--t3)">PV / UV 趋势折线图</div>
    </div>
    <div id="ops-panel-2" style="display:none">
      <div class="tabs"><span class="tab on" onclick="switchLogTab(0)">C 端业务日志</span><span class="tab" onclick="switchLogTab(1)">管理员操作日志</span></div>
      <div id="log-panel-0">
        <div style="color:var(--t3);font-size:13px;margin:8px 0">C 端用户关键读写行为，用于业务监控与回溯</div>
        <div class="toolbar"><input class="input" placeholder="🔍 用户 / 内容"><select class="select"><option>全部类型</option></select><input class="input" style="width:160px" placeholder="日期范围"></div>
        <table><thead><tr><th>时间</th><th>用户</th><th>类型</th><th>内容</th><th>结果</th></tr></thead>
        <tbody>${bizLogs.map(l=>`<tr><td>${l[0]}</td><td>${l[1]}</td><td><span class="tag blue">${l[2]}</span></td><td>${l[3]}</td><td>${l[4]}</td></tr>`).join('')}</tbody></table>
      </div>
      <div id="log-panel-1" style="display:none">
        <div style="color:var(--t3);font-size:13px;margin:8px 0">后台管理员写操作记录，用于权限审计与追责</div>
        <div class="toolbar"><input class="input" placeholder="🔍 操作人 / 内容"><select class="select"><option>全部类型</option></select><input class="input" style="width:160px" placeholder="日期范围"></div>
        <table><thead><tr><th>时间</th><th>操作人</th><th>类型</th><th>操作内容</th></tr></thead>
        <tbody>${adminLogs.map(l=>`<tr><td>${l[0]}</td><td>${l[1]}</td><td><span class="tag blue">${l[2]}</span></td><td>${l[3]}</td></tr>`).join('')}</tbody></table>
      </div>
    </div>
    <div id="ops-panel-3" style="display:none">
      <div class="card-head"><h3>数据操作</h3></div>
      <div style="margin-bottom:8px;color:var(--t2)">SQL 查询（只读）</div>
      <textarea class="sqlbox">SELECT * FROM user WHERE id = 1;</textarea>
      <div style="text-align:right;margin-top:10px"><span class="btn btn-primary">执行查询</span></div>
      <div style="margin:16px 0 8px;color:var(--red)">⚠️ 数据修改（需二次确认，禁止 DROP/TRUNCATE，记入管理员操作日志）</div>
      <textarea class="sqlbox">UPDATE user SET status = 1 WHERE id = 5;</textarea>
      <div style="text-align:right;margin-top:10px"><span class="btn btn-danger">执行修改</span></div>
    </div>
  </div>`;
};
function switchOpsTab(idx){
  const card=document.getElementById('ops-panel-0')?.parentElement;
  if(!card)return;
  card.querySelectorAll(':scope > .tabs .tab').forEach(t=>t.classList.remove('on'));
  card.querySelectorAll(':scope > .tabs .tab')[idx]?.classList.add('on');
  for(let i=0;i<4;i++){const p=document.getElementById('ops-panel-'+i);if(p)p.style.display=i===idx?'':'none';}
}
function switchLogTab(idx){
  const card=document.getElementById('log-panel-0')?.parentElement;
  if(!card)return;
  card.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('on'));
  card.querySelectorAll('.tabs .tab')[idx]?.classList.add('on');
  for(let i=0;i<2;i++){const p=document.getElementById('log-panel-'+i);if(p)p.style.display=i===idx?'':'none';}
}

/* ---------- 初始化 ---------- */
renderMenu();
nav('dashboard');
</script>
</body>
</html>
