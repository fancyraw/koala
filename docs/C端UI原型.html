<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C端页面 UI 原型</title>
<style>
  :root{
    --red:#FF2442; --red-bg:#FFECEC; --red-soft:#FFF5F5;
    --title:#1A1A1A; --text:#333333; --sub:#999999; --weak:#C8C8C8;
    --bg:#F8F8F8; --line:#F0F0F0; --gray:#F5F5F5;
    --gold1:#E8C97A; --gold2:#C9A24B; --gold-deep:#A8791A;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#E8E8E8;color:var(--text);padding:44px 24px 90px;}
  .head{text-align:center;margin-bottom:6px;font-size:28px;color:var(--title);font-weight:700;letter-spacing:1px;}
  .subhead{text-align:center;margin-bottom:46px;font-size:13px;color:#999;}
  .subhead b{color:var(--red);}
  .gallery{display:flex;flex-wrap:wrap;gap:40px;justify-content:center;align-items:flex-start;max-width:1720px;margin:0 auto;}
  .frame{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .frame > .tag{font-size:13px;color:#666;font-weight:600;background:#fff;padding:5px 16px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);}

  .phone{width:375px;height:780px;background:#fff;border-radius:44px;border:11px solid #1a1a1a;box-shadow:0 18px 50px rgba(0,0,0,.2);position:relative;overflow:hidden;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:28px;background:#1a1a1a;border-radius:0 0 18px 18px;z-index:60;}
  .sb{height:40px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 5px;font-size:13px;font-weight:600;color:var(--title);position:relative;z-index:40;background:#fff;}
  .sb .r{letter-spacing:1px;font-size:11px;}
  .screen{height:calc(100% - 40px);overflow-y:auto;position:relative;background:var(--bg);}
  .screen::-webkit-scrollbar{width:0;}

  .img{position:relative;overflow:hidden;background:#eee;}
  .img .em{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:38px;opacity:.42;}
  .c1{background:linear-gradient(135deg,#F5EDE4,#EAD9C5);}
  .c2{background:linear-gradient(135deg,#F7E9EC,#EFD5DC);}
  .c3{background:linear-gradient(135deg,#EAF0E6,#D6E5CE);}
  .c4{background:linear-gradient(135deg,#E6EEF2,#CFE0E8);}
  .c5{background:linear-gradient(135deg,#EFEAF2,#DED5E6);}
  .c6{background:linear-gradient(135deg,#F5F0E2,#E8DFC4);}
  .c7{background:linear-gradient(135deg,#FCEEE8,#F6D9CC);}

  .price{color:var(--red);font-weight:700;}
  .price .s{font-size:.62em;font-weight:700;margin-right:1px;}
  .qtag{display:inline-block;background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;margin-left:6px;vertical-align:middle;line-height:14px;}
  /* 商品卡图片右上角券标 */
  .img-q{position:absolute;right:6px;top:6px;background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;line-height:14px;z-index:2;box-shadow:0 1px 3px rgba(0,0,0,.18);}
  /* 商品卡优惠标签行（标题下、价格上，按类型配色） */
  .ctags{display:flex;flex-wrap:nowrap;gap:3px;margin:5px 0;overflow:hidden;}
  .ctag{font-size:9px;line-height:13px;padding:1px 4px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
  .ctag.red{background:#FFECEC;color:#FF2442;}
  .ctag.orange{background:#FFF3E8;color:#FA8C16;}
  .ctag.gold{background:#FBF3DF;color:#C9A24B;}
  /* 商品卡加购按钮（通用：首页热销/推荐、商品列表共用） */
  .addcart{width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer;padding:0;}
  /* 首页顶部购物车入口 */
  .homecart{margin-left:auto;position:relative;font-size:22px;color:var(--title);}
  .homecart .hcb{position:absolute;top:-5px;right:-7px;background:var(--red);color:#fff;font-size:9px;min-width:15px;height:15px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
  /* 商品列表顶部搜索框 */
  .searchbar{flex:1;height:34px;background:var(--gray);border-radius:999px;display:flex;align-items:center;gap:6px;padding:0 14px;margin-left:8px;color:var(--weak);font-size:13px;}

  .btn{border:none;border-radius:999px;font-weight:600;cursor:pointer;font-size:15px;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-soft{background:var(--gray);color:var(--text);}
  .btn-redsoft{background:var(--red-bg);color:var(--red);}

  /* 首页顶部：Logo + 品牌名 */
  .topbar{height:48px;display:flex;align-items:center;gap:9px;padding:0 16px;background:#fff;}
  .logo{width:28px;height:28px;border-radius:9px;background:var(--red);color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand{font-size:17px;font-weight:600;color:var(--title);}

  .nav{height:48px;display:flex;align-items:center;padding:0 14px;background:#fff;position:relative;}
  .nav .back{font-size:22px;color:var(--title);line-height:1;}
  .nav .ctitle{position:absolute;left:50%;transform:translateX(-50%);font-size:16px;font-weight:600;color:var(--title);}
  .nav .right{margin-left:auto;font-size:13px;color:#333;}

  .sec{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
  .sec h3{font-size:16px;font-weight:600;color:var(--title);}
  .sec .more{font-size:13px;color:var(--sub);}
  .gap{height:8px;background:var(--bg);}
  .white{background:#fff;}

  /* Banner 纯图 */
  .banner{padding:10px 12px;background:#fff;}
  .banner .b{height:150px;border-radius:16px;position:relative;overflow:hidden;}
  .banner .dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:5px;align-items:center;}
  .banner .dots i{width:5px;height:5px;border-radius:3px;background:rgba(255,255,255,.6);}
  .banner .dots i.on{width:14px;height:3px;background:#fff;border-radius:2px;}

  .coupon{margin:10px 12px 0;background:linear-gradient(135deg,#FFF5F5,#FFECEC);border-radius:12px;display:flex;align-items:center;gap:10px;padding:11px 12px;}
  .coupon .q{width:22px;height:22px;border-radius:6px;background:var(--red);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .coupon .get{font-size:12px;color:var(--red);flex-shrink:0;}

  .cats{display:flex;justify-content:space-between;padding:6px 16px 16px;background:#fff;}
  .cat{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .cat .cc{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;}
  .cat span{font-size:11px;color:#333;}

  .hot-wrap{background:#fff;padding-bottom:14px;}
  .hscroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 2px;}
  .hscroll::-webkit-scrollbar{height:0;}
  .hot{width:130px;flex-shrink:0;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.05);}
  .hot .img{width:130px;height:130px;}
  /* 商品卡图片左上角商品标签角标（后台配置：热销/新品/礼盒/特惠，单个） */
  .ptag-tl{position:absolute;left:6px;top:6px;background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;line-height:14px;z-index:2;box-shadow:0 1px 3px rgba(0,0,0,.18);}
  .hot .info{padding:10px;}
  .hot .nm{font-size:13px;color:var(--title);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
  .hot .price{font-size:18px;}
  .hot .hpr{display:flex;align-items:center;justify-content:space-between;}
  .hot .sold{font-size:10px;color:var(--sub);flex-shrink:0;}

  /* 首页精选推荐：左右图文卡（图左信息右，高屏效） */
  .rec{background:#fff;border-radius:16px;margin:0 12px 12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04);display:flex;}
  .rec .img{width:120px;height:120px;flex-shrink:0;border-radius:12px;margin:10px 0 10px 10px;}
  .rec .info{padding:12px 14px;flex:1;display:flex;flex-direction:column;min-width:0;}
  .rec .nm{font-size:15px;font-weight:600;color:var(--title);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rec .desc{font-size:13px;color:#666;line-height:19px;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .rec .foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;}
  .rec .foot .price{font-size:17px;}
  .rec .foot .sold{font-size:11px;color:var(--sub);}

  /* 新人券弹窗 */
  .popup{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:55;}
  .popup .card{width:280px;background:#fff;border-radius:20px;overflow:hidden;text-align:center;position:relative;}
  .popup .ptop{background:linear-gradient(135deg,#FF2442,#FF8A3D);padding:26px 20px 22px;color:#fff;}
  .popup .ptop .t1{font-size:16px;font-weight:600;}
  .popup .ptop .t2{font-size:42px;font-weight:800;margin-top:8px;line-height:1;}
  .popup .ptop .t2 small{font-size:18px;font-weight:700;}
  .popup .ptop .t3{font-size:12px;margin-top:8px;opacity:.95;}
  .popup .pbody{padding:18px;}
  .popup .pbody .d{font-size:13px;color:#666;}
  .popup .pbody .btn{margin-top:16px;width:100%;height:44px;}
  .popup .close{position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;}

  /* 筛选栏 */
  .filters{display:flex;gap:22px;padding:10px 16px;overflow-x:auto;background:#fff;}
  .filters::-webkit-scrollbar{height:0;}
  .filters .f{font-size:13px;color:var(--sub);white-space:nowrap;position:relative;padding-bottom:6px;}
  .filters .f.on{color:var(--title);font-size:14px;font-weight:600;}
  .filters .f.on::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:16px;height:3px;background:var(--red);border-radius:2px;}

  /* 瀑布流（商品列表） */
  .waterfall{padding:10px 8px;column-count:2;column-gap:8px;}
  .wf{break-inside:avoid;margin-bottom:8px;background:#fff;border-radius:16px;overflow:hidden;display:inline-block;width:100%;box-shadow:0 1px 6px rgba(0,0,0,.04);}
  .wf .img{width:100%;}
  .wf .info{padding:10px;}
  .wf .nm{font-size:13px;color:var(--title);line-height:18px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px;}
  .wf .pr{display:flex;align-items:center;justify-content:space-between;}
  .wf .price{font-size:15px;}
  .wf .sold{font-size:11px;color:var(--sub);}

  /* 详情页 */
  .dnav{position:absolute;top:40px;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:30;}
  .dnav .cb{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;color:#222;font-size:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .dmain{width:100%;height:375px;position:relative;}
  .dmain .em{font-size:72px;}
  .dmain .cnt{position:absolute;right:12px;bottom:14px;background:rgba(0,0,0,.4);color:#fff;font-size:11px;padding:3px 9px;border-radius:999px;}
  .dprice{background:#fff;padding:16px;}
  .dprice .row{display:flex;align-items:center;justify-content:space-between;}
  .dprice .now{color:var(--red);font-weight:700;font-size:28px;}
  .dprice .now .s{font-size:14px;}
  .dprice .ptag{background:var(--red-bg);color:var(--red);font-size:10px;padding:3px 8px;border-radius:6px;}
  .vprice{display:inline-block;color:var(--gold-deep);font-size:11px;font-weight:600;margin-top:8px;background:linear-gradient(135deg,#FBF3DF,#F3E2B8);padding:3px 9px;border-radius:6px;}
  .dprice .nm{font-size:17px;font-weight:600;color:var(--title);line-height:24px;margin-top:10px;}
  .dprice .sold{font-size:12px;color:var(--sub);margin-top:6px;}
  .dcoupon{margin:12px 16px 0;background:var(--red-soft);border-radius:10px;display:flex;align-items:center;gap:8px;padding:10px 12px;}
  .dcoupon .q{width:18px;height:18px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:5px;display:flex;align-items:center;justify-content:center;}
  .dcoupon .t{flex:1;font-size:13px;color:var(--text);}
  .dcoupon .g{font-size:13px;color:var(--red);}
  .dblock{background:#fff;padding:16px;}
  .dblock h4{font-size:15px;font-weight:600;color:var(--title);margin-bottom:12px;}
  .specs{display:flex;gap:10px;}
  .spec{background:var(--gray);color:var(--text);font-size:13px;padding:8px 16px;border-radius:8px;}
  .spec.on{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
  .qty{display:flex;align-items:center;justify-content:space-between;}
  .qty .l{font-size:15px;color:var(--title);}
  .step{display:flex;align-items:center;gap:12px;}
  .step button{width:28px;height:28px;border-radius:50%;background:var(--gray);border:none;font-size:16px;color:#333;cursor:pointer;}
  .step .n{font-size:15px;min-width:18px;text-align:center;color:var(--title);}
  .hls{display:flex;justify-content:space-around;}
  .hl{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .hl .hi{width:44px;height:44px;border-radius:14px;background:#FAFAFA;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .hl span{font-size:11px;color:#666;}
  .dbar{position:absolute;bottom:0;left:0;right:0;height:60px;background:#fff;display:flex;align-items:center;padding:0 12px;gap:8px;box-shadow:0 -1px 10px rgba(0,0,0,.05);z-index:20;}
  .dbar .ico{display:flex;flex-direction:column;align-items:center;gap:2px;width:48px;font-size:10px;color:var(--sub);}
  .dbar .ico .e{font-size:18px;}
  .dbar .btn{flex:1;height:40px;}

  /* 购物车 */
  .cart-list{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
  .citem{background:#fff;border-radius:16px;padding:12px;display:flex;gap:10px;position:relative;}
  .ck{width:18px;height:18px;border-radius:50%;border:1.5px solid #E0E0E0;flex-shrink:0;display:flex;align-items:center;justify-content:center;align-self:center;color:#fff;font-size:11px;}
  .ck.on{background:var(--red);border-color:var(--red);}
  .citem .img{width:76px;height:76px;border-radius:12px;flex-shrink:0;}
  .citem .info{flex:1;display:flex;flex-direction:column;min-width:0;}
  .citem .nm{font-size:13px;color:var(--title);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .citem .st{font-size:11px;color:var(--sub);background:var(--gray);padding:2px 8px;border-radius:6px;align-self:flex-start;margin-top:5px;}
  .citem .bot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;}
  .citem .bot .price{font-size:16px;}
  .citem .step button{width:22px;height:22px;font-size:14px;}
  .citem .step .n{font-size:13px;}
  .cartbar{position:absolute;bottom:0;left:0;right:0;height:60px;background:#fff;display:flex;align-items:center;padding:0 14px;gap:8px;box-shadow:0 -1px 10px rgba(0,0,0,.05);}
  .cartbar .all{display:flex;align-items:center;gap:6px;font-size:13px;color:#666;}
  .cartbar .tot{margin-left:auto;text-align:right;}
  .cartbar .tot .big{font-size:13px;color:#333;}
  .cartbar .tot .big b{color:var(--red);font-size:18px;}
  .cartbar .tot .sm{font-size:10px;color:var(--sub);}
  .cartbar .btn{height:40px;padding:0 24px;}

  /* 通用卡片/订单 */
  .card{background:#fff;border-radius:16px;margin:10px 12px 0;padding:16px;}
  .addr{display:flex;align-items:center;gap:12px;}
  .addr .pin{color:var(--red);font-size:18px;}
  .addr .ai{flex:1;}
  .addr .l1{font-size:15px;color:var(--title);}
  .addr .l1 b{font-weight:600;margin-right:10px;}
  .addr .l2{font-size:13px;color:var(--sub);margin-top:5px;}
  .addr .ar{color:var(--weak);font-size:18px;}
  .oitem{display:flex;gap:10px;align-items:center;}
  .oitem .img{width:64px;height:64px;border-radius:12px;flex-shrink:0;}
  .oitem .info{flex:1;}
  .oitem .nm{font-size:13px;color:var(--title);}
  .oitem .st{font-size:11px;color:var(--sub);background:var(--gray);padding:2px 8px;border-radius:6px;display:inline-block;margin-top:5px;}
  .oitem .rt{text-align:right;}
  .oitem .rt .price{font-size:13px;}
  .oitem .rt .q{font-size:12px;color:var(--sub);margin-top:4px;}
  .line{height:1px;background:var(--line);margin:12px 0;}
  .frow{display:flex;align-items:center;justify-content:space-between;font-size:14px;}
  .frow + .frow{margin-top:12px;}
  .frow .lab{color:var(--sub);}
  .frow .lab.dark{color:var(--title);}
  .frow .val{color:var(--title);}
  .frow .val.red{color:var(--red);}
  .frow .val.gold{color:var(--gold2);}
  .toggle{width:40px;height:22px;border-radius:999px;background:var(--red);position:relative;flex-shrink:0;}
  .toggle i{position:absolute;top:2px;right:2px;width:18px;height:18px;background:#fff;border-radius:50%;}
  .note{width:100%;background:#FAFAFA;border:none;border-radius:8px;padding:10px;font-size:13px;color:#333;margin-top:10px;}
  .note::placeholder{color:var(--weak);}
  .subbar{position:absolute;bottom:0;left:0;right:0;height:60px;background:#fff;display:flex;align-items:center;padding:0 14px;box-shadow:0 -1px 10px rgba(0,0,0,.05);}
  .subbar .tot{font-size:13px;color:#333;}
  .subbar .tot b{color:var(--red);font-size:20px;}
  .subbar .tot .sm{font-size:10px;color:var(--sub);}
  .subbar .btn{margin-left:auto;height:42px;padding:0 30px;font-size:16px;}

  /* 支付结果 */
  .pay{display:flex;flex-direction:column;align-items:center;padding:80px 0 40px;background:#fff;height:100%;}
  .pay .icon{width:56px;height:56px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;box-shadow:0 0 0 8px rgba(255,36,66,.08);}
  .pay .t{font-size:18px;font-weight:600;color:var(--title);margin-top:14px;}
  .pay .amt{font-size:26px;font-weight:700;color:var(--title);margin-top:8px;}
  .pay .save{font-size:12px;color:var(--red);margin-top:8px;background:var(--red-bg);padding:4px 12px;border-radius:999px;}
  .pay .pts{font-size:12px;color:var(--gold-deep);margin-top:12px;background:linear-gradient(135deg,#FBF3DF,#F3E2B8);padding:5px 14px;border-radius:999px;}
  .pay .btns{display:flex;gap:12px;margin-top:32px;}
  .pay .btns .btn{width:130px;height:40px;}

  /* 订单详情 */
  .ostatus{background:#fff;padding:18px 16px;display:flex;align-items:center;}
  .ostatus .l{flex:1;}
  .ostatus .s{font-size:18px;font-weight:600;color:var(--title);}
  .ostatus .d{font-size:12px;color:var(--sub);margin-top:5px;}
  .ostatus .ill{font-size:36px;opacity:.8;}
  .pts-bar{background:linear-gradient(135deg,#FBF3DF,#F3E2B8);color:var(--gold-deep);font-size:12px;font-weight:500;padding:8px 16px;}
  /* 物流时间轴 */
  .tlcard{background:#fff;border-radius:16px;margin:10px 12px 0;padding:16px;}
  .tlcard .h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .tlcard .h .t{font-size:15px;font-weight:600;color:var(--title);}
  .tlcard .h .more{font-size:12px;color:var(--sub);}
  /* 查看物流弹窗 */
  .logipop{position:absolute;inset:0;z-index:50;}
  .logimask{position:absolute;inset:0;background:rgba(0,0,0,.45);}
  .logicard{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:16px 16px 0 0;padding:16px 16px 24px;max-height:72%;overflow-y:auto;}

<script>
const sb=()=>`<div class="sb"><span>9:41</span><span class="r">●●● 5G ▮</span></div>`;
const notch=()=>`<div class="notch"></div>`;

function tabbar(active){

    {k:'cart',l:'购物车',b:3,p:'<path d="M3 4h2l2.4 12.4a2 2 0 002 1.6h7.7a2 2 0 002-1.6L22 8H6" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="21" r="1.2" stroke-width="1.8"/><circle cx="18" cy="21" r="1.2" stroke-width="1.8"/>'},

  ];
  return `<div class="tabbar">${tabs.map(t=>`<div class="tab ${t.k===active?'on':''}">
    ${t.b?`<span class="badge">${t.b}</span>`:''}

    <span>${t.l}</span></div>`).join('')}</div>`;
}
function frame(tag,inner){return `<div class="frame"><div class="tag">${tag}</div><div class="phone">${notch()}${sb()}<div class="screen">${inner}</div></div></div>`;}

/* 商品标签角标：后台配置的单个标签（热销/新品/礼盒/特惠），无则不展示 */
function ptagHtml(label){return label?`<span class="ptag-tl">${label}</span>`:'';}

/* 优惠标签：按优先级(满减>无门槛>会员)取前 max 个整标签，多余不展示 */

function ctagsHtml(tags,max){
  const order={full:0,noth:1,member:2},cls={full:'red',noth:'orange',member:'gold'};
  return `<div class="ctags">${[...tags].sort((a,b)=>order[a.t]-order[b.t]).slice(0,max).map(x=>`<span class="ctag ${cls[x.t]}">${x.label}</span>`).join('')}</div>`;
}
